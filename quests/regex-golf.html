<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regex Golf — One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* ========================================
         Reset & Variables
         ======================================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c14;
            --surface: #0f1520;
            --surface-2: #161e2e;
            --border: #1e293b;
            --green: #00ff88;
            --green-dim: rgba(0, 255, 136, 0.15);
            --green-glow: rgba(0, 255, 136, 0.4);
            --blue: #00ccff;
            --blue-dim: rgba(0, 204, 255, 0.15);
            --pink: #ff3366;
            --pink-dim: rgba(255, 51, 102, 0.15);
            --gold: #ffd700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --text: #e0e8f0;
            --text-dim: #64748b;
            --font: "Space Mono", "SF Mono", "Fira Code", monospace;
        }

        /* ========================================
         Layout
         ======================================== */
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 204, 255, 0.04) 0%, transparent 60%);
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        /* ========================================
         Title Screen
         ======================================== */
        .title-screen {
            text-align: center;
            padding: 4rem 1rem;
            animation: fadeIn 0.6s ease;
        }

        .title-screen h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--green);
            text-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(0, 255, 136, 0.15);
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }

        .title-screen .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .title-screen .tagline {
            color: var(--blue);
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        .title-screen .how-to {
            text-align: left;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            font-size: 0.82rem;
            line-height: 1.8;
            color: var(--text-dim);
        }

        .title-screen .how-to h3 {
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .title-screen .how-to span.hl {
            color: var(--green);
        }

        .btn {
            display: inline-block;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            padding: 0.75rem 2.5rem;
            border: 2px solid var(--green);
            color: var(--green);
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--green);
            color: var(--bg);
            box-shadow: 0 0 20px var(--green-glow);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-small {
            font-size: 0.78rem;
            padding: 0.5rem 1.2rem;
            letter-spacing: 1px;
        }

        .btn-ghost {
            border-color: var(--border);
            color: var(--text-dim);
        }

        .btn-ghost:hover {
            border-color: var(--text-dim);
            color: var(--text);
            background: var(--surface-2);
            box-shadow: none;
        }

        /* ========================================
         Game Screen
         ======================================== */
        .game-screen {
            animation: fadeIn 0.4s ease;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hole-badge {
            font-size: 0.78rem;
            color: var(--blue);
            border: 1px solid rgba(0, 204, 255, 0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            background: var(--blue-dim);
            white-space: nowrap;
        }

        .hole-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            min-width: 0;
        }

        .hole-desc {
            width: 100%;
            color: var(--text-dim);
            font-size: 0.82rem;
            margin-bottom: 1.25rem;
        }

        /* ========================================
         String Columns
         ======================================== */
        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 480px) {
            .columns {
                grid-template-columns: 1fr;
            }
        }

        .column {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .column-header {
            padding: 0.6rem 1rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .col-match .column-header {
            color: var(--green);
            background: var(--green-dim);
        }

        .col-avoid .column-header {
            color: var(--pink);
            background: var(--pink-dim);
        }

        .string-list {
            list-style: none;
            padding: 0.5rem 0;
        }

        .string-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 1rem;
            font-size: 0.88rem;
            transition: all 0.15s;
        }

        .string-item .status-icon {
            font-size: 0.7rem;
            width: 1.2rem;
            text-align: center;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .string-item.correct .status-icon {
            opacity: 1;
            color: var(--green);
        }

        .string-item.wrong .status-icon {
            opacity: 1;
            color: var(--pink);
        }

        .string-item.correct .string-text {
            color: var(--green);
        }

        .string-item.wrong .string-text {
            color: var(--pink);
        }

        .string-item.neutral .string-text {
            color: var(--text-dim);
        }

        .string-text {
            transition: color 0.15s;
        }

        .match-highlight {
            background: var(--green-dim);
            border-radius: 2px;
            padding: 0 1px;
        }

        /* ========================================
         Regex Input
         ======================================== */
        .input-area {
            margin-bottom: 1rem;
        }

        .regex-wrapper {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0 1rem;
            transition: border-color 0.2s;
        }

        .regex-wrapper:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-dim);
        }

        .regex-wrapper.all-correct:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-dim);
        }

        .regex-slash {
            color: var(--text-dim);
            font-size: 1.2rem;
            user-select: none;
        }

        .regex-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--font);
            font-size: 1.05rem;
            padding: 0.85rem 0.5rem;
            caret-color: var(--green);
        }

        .regex-input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        .input-error {
            color: var(--pink);
            font-size: 0.75rem;
            margin-top: 0.4rem;
            padding-left: 0.25rem;
            min-height: 1.2em;
        }

        /* ========================================
         Score & Actions
         ======================================== */
        .score-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.25rem;
            font-size: 0.82rem;
            flex-wrap: wrap;
        }

        .score-item {
            color: var(--text-dim);
        }

        .score-item strong {
            color: var(--text);
        }

        .score-item.under-par strong {
            color: var(--green);
        }

        .score-item.over-par strong {
            color: var(--pink);
        }

        .stars {
            display: flex;
            gap: 4px;
            font-size: 1.1rem;
        }

        .star {
            color: var(--border);
            transition: all 0.3s;
        }

        .star.earned {
            color: var(--gold);
            text-shadow: 0 0 8px var(--gold-dim);
            animation: starPop 0.3s ease;
        }

        @keyframes starPop {
            0% {
                transform: scale(0.5);
            }

            60% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            background: transparent;
            color: var(--green);
            box-shadow: none;
            transform: none;
        }

        /* ========================================
         Progress Bar
         ======================================== */
        .progress-bar {
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .progress-track {
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        /* ========================================
         Hole Complete Overlay
         ======================================== */
        .hole-complete {
            text-align: center;
            padding: 2rem 1rem;
            animation: fadeIn 0.4s ease;
        }

        .hole-complete .result-stars {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .hole-complete .result-label {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .hole-complete .result-label.eagle {
            color: var(--gold);
        }

        .hole-complete .result-label.birdie {
            color: var(--green);
        }

        .hole-complete .result-label.par-result {
            color: var(--blue);
        }

        .hole-complete .result-label.bogey {
            color: var(--pink);
        }

        .hole-complete .result-detail {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .hole-complete .result-regex {
            font-size: 1.1rem;
            color: var(--text);
            background: var(--surface);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .hole-complete .actions {
            justify-content: center;
        }

        /* ========================================
         Scorecard (Game Complete)
         ======================================== */
        .scorecard {
            animation: fadeIn 0.5s ease;
            text-align: center;
            padding: 1rem 0;
        }

        .scorecard h2 {
            font-size: 1.8rem;
            color: var(--green);
            text-shadow: 0 0 20px var(--green-glow);
            margin-bottom: 0.5rem;
        }

        .scorecard .total-stars {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
            font-size: 0.8rem;
        }

        .scorecard-table th {
            padding: 0.6rem 0.5rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-dim);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }

        .scorecard-table td {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .scorecard-table .hole-num {
            color: var(--blue);
        }

        .scorecard-table .sc-under {
            color: var(--green);
        }

        .scorecard-table .sc-over {
            color: var(--pink);
        }

        .scorecard-table .sc-par {
            color: var(--blue);
        }

        .scorecard .actions {
            justify-content: center;
        }

        /* ========================================
         Footer
         ======================================== */
        footer {
            margin-top: auto;
            padding-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        footer a {
            color: var(--blue);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ========================================
         Animations
         ======================================== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
         Confetti
         ======================================== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            border-radius: 1px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>

<body>
    <div class="container" id="app"></div>

    <footer>
        <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
        /* ========================================
           Level Data
           ======================================== */
        const LEVELS = [
            {
                name: "Plain Strings",
                desc: "All the foos. None of the bars.",
                match: ["foo", "food", "foot", "fool", "foobar"],
                avoid: ["bar", "baz", "bat", "bag", "ban"],
                par: 3
            },
            {
                name: "Anchors Away",
                desc: 'Only words that start with "a" get through.',
                match: ["ark", "art", "arm", "arc", "area"],
                avoid: ["bark", "cart", "farm", "marc", "scar"],
                par: 2
            },
            {
                name: "The Enders",
                desc: 'Must end with "ing". Watch for impostors.',
                match: ["coding", "running", "testing", "building", "hacking"],
                avoid: ["singer", "rings", "bingo", "stringer", "kingdom"],
                par: 4
            },
            {
                name: "Digit Hunt",
                desc: "If it has a number anywhere, it belongs.",
                match: ["abc1", "test42", "hello7", "x99y", "a0b"],
                avoid: ["abcdef", "testing", "hellooo", "xyzzy", "foobar"],
                par: 2
            },
            {
                name: "Double Trouble",
                desc: "Consecutive repeated letters are the key.",
                match: ["book", "green", "coffee", "llama", "aardvark"],
                avoid: ["blue", "grain", "cafe", "lemon", "azure"],
                par: 5
            },
            {
                name: "Dotcom Era",
                desc: "Only .com domains survive the bubble.",
                match: ["google.com", "github.com", "linux.com", "dev.com", "x.com"],
                avoid: ["google.org", "github.io", "uncommon.net", "dev.to", "x.ai"],
                par: 5
            },
            {
                name: "Size Matters",
                desc: "Exactly 3 characters. Not 2, not 4. Three.",
                match: ["cat", "dog", "yes", "no!", "42x"],
                avoid: ["cats", "do", "y", "no", "42"],
                par: 5
            },
            {
                name: "Alternation Alley",
                desc: 'Only "cat" or "dog". Nothing else passes.',
                match: ["cat", "dog"],
                avoid: ["bat", "fog", "cot", "dig", "cab", "dot"],
                par: 7
            },
            {
                name: "Vowel Desert",
                desc: "Zero vowels (a, e, i, o, u). Bone dry.",
                match: ["gym", "myth", "lynx", "crypt", "glyph"],
                avoid: ["game", "moth", "yell", "crisp", "graph"],
                par: 11
            },
            {
                name: "The Grand Finale",
                desc: "Real email addresses only. No garbage.",
                match: ["a@b.co", "user@test.com", "me@x.io", "hi@dev.org"],
                avoid: ["@test.com", "user@", "no-at-sign", "a@.com", "test.com"],
                par: 5
            }
        ];

        /* ========================================
           Game State
           ======================================== */
        const STORAGE_KEY = "regex-golf-progress";

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch { }
            return { best: {} };
        }

        function saveProgress(state) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch { }
        }

        let progress = loadProgress();
        let currentHole = 0;
        let currentInput = "";
        const app = document.getElementById("app");

        /* ========================================
           Regex Evaluation
           ======================================== */
        function testRegex(pattern, str) {
            try {
                const re = new RegExp(pattern);
                return re.test(str);
            } catch {
                return null;
            }
        }

        function evaluateLevel(pattern, level) {
            if (!pattern) return { matchResults: null, avoidResults: null, allCorrect: false, error: null };

            let re;
            try {
                re = new RegExp(pattern);
            } catch (e) {
                return { matchResults: null, avoidResults: null, allCorrect: false, error: e.message.replace(/^Invalid regular expression: /, "") };
            }

            const matchResults = level.match.map((s) => ({ str: s, matched: re.test(s), correct: re.test(s) }));
            const avoidResults = level.avoid.map((s) => ({ str: s, matched: re.test(s), correct: !re.test(s) }));
            const allCorrect = matchResults.every((r) => r.correct) && avoidResults.every((r) => r.correct);

            return { matchResults, avoidResults, allCorrect, error: null };
        }

        function getStars(length, par) {
            if (length <= par) return 3;
            if (length <= Math.ceil(par * 1.5)) return 2;
            return 1;
        }

        function getScoreLabel(length, par) {
            const diff = length - par;
            if (diff <= -2) return { text: "EAGLE", cls: "eagle" };
            if (diff < 0) return { text: "BIRDIE", cls: "birdie" };
            if (diff === 0) return { text: "PAR", cls: "par-result" };
            return { text: "BOGEY", cls: "bogey" };
        }

        /* ========================================
           Rendering
           ======================================== */
        function renderStars(count, size) {
            return [1, 2, 3].map((i) => `<span class="star ${i <= count ? "earned" : ""}">&#9733;</span>`).join("");
        }

        function renderTitleScreen() {
            const solved = Object.keys(progress.best).length;
            const hasProgress = solved > 0;

            app.innerHTML = `
          <div class="title-screen">
            <h1>REGEX GOLF</h1>
            <p class="subtitle">Master patterns. Minimize strokes.</p>
            <p class="tagline">10 holes &bull; Write the shortest regex to separate the strings</p>
            <div class="how-to">
              <h3>How to Play</h3>
              <p>Each hole shows two groups of strings: <span class="hl">MATCH</span> (must match your regex) and AVOID (must not).</p>
              <p>Write the <span class="hl">shortest regex</span> that matches all MATCH strings and none of the AVOID strings.</p>
              <p>Fewer characters = better score. Beat par for <span class="hl">&#9733;&#9733;&#9733;</span>.</p>
            </div>
            <div class="actions" style="justify-content: center; gap: 1rem;">
              <button class="btn" onclick="startGame(0)">TEE OFF</button>
              ${hasProgress ? `<button class="btn btn-small btn-ghost" onclick="renderScorecard()">SCORECARD (${solved}/10)</button>` : ""}
              ${hasProgress ? `<button class="btn btn-small btn-ghost" onclick="resetProgress()">RESET</button>` : ""}
            </div>
          </div>
        `;
        }

        function renderHole() {
            const level = LEVELS[currentHole];
            const { matchResults, avoidResults, allCorrect, error } = evaluateLevel(currentInput, level);
            const hasInput = currentInput.length > 0;
            const stars = hasInput && allCorrect ? getStars(currentInput.length, level.par) : 0;
            const lengthCls = hasInput ? (currentInput.length <= level.par ? "under-par" : currentInput.length > Math.ceil(level.par * 1.5) ? "over-par" : "") : "";

            function renderItems(results, isMatchCol) {
                const items = isMatchCol ? level.match : level.avoid;
                return items
                    .map((str, i) => {
                        if (!results) return `<li class="string-item neutral"><span class="status-icon">&middot;</span><span class="string-text">${escHtml(str)}</span></li>`;
                        const r = results[i];
                        const cls = r.correct ? "correct" : "wrong";
                        const icon = r.correct ? "&#10003;" : "&#10007;";
                        return `<li class="string-item ${cls}"><span class="status-icon">${icon}</span><span class="string-text">${escHtml(str)}</span></li>`;
                    })
                    .join("");
            }

            app.innerHTML = `
          <div class="game-screen">
            <div class="game-header">
              <span class="hole-badge">HOLE ${currentHole + 1} / ${LEVELS.length}</span>
              <span class="hole-name">${escHtml(level.name)}</span>
            </div>
            <p class="hole-desc">${escHtml(level.desc)}</p>

            <div class="columns">
              <div class="column col-match">
                <div class="column-header">&#10003; Match These</div>
                <ul class="string-list">${renderItems(matchResults, true)}</ul>
              </div>
              <div class="column col-avoid">
                <div class="column-header">&#10007; Avoid These</div>
                <ul class="string-list">${renderItems(avoidResults, false)}</ul>
              </div>
            </div>

            <div class="input-area">
              <div class="regex-wrapper ${allCorrect ? "all-correct" : ""}">
                <span class="regex-slash">/</span>
                <input class="regex-input" id="regexInput" type="text" value="${escAttr(currentInput)}" placeholder="type your regex..." autocomplete="off" autocapitalize="off" spellcheck="false" />
                <span class="regex-slash">/</span>
              </div>
              <div class="input-error">${error ? escHtml(error) : ""}</div>
            </div>

            <div class="score-bar">
              <span class="score-item">Par: <strong>${level.par}</strong></span>
              <span class="score-item ${lengthCls}">Yours: <strong>${hasInput ? currentInput.length : "-"}</strong></span>
              <span class="stars">${renderStars(stars)}</span>
              ${progress.best[currentHole] != null ? `<span class="score-item" style="margin-left: auto;">Best: <strong>${progress.best[currentHole]}</strong></span>` : ""}
            </div>

            <div class="actions">
              <button class="btn" ${!allCorrect ? "disabled" : ""} onclick="submitHole()">SUBMIT</button>
              ${currentHole > 0 ? `<button class="btn btn-small btn-ghost" onclick="goToHole(${currentHole - 1})">&larr; PREV</button>` : ""}
              ${currentHole < LEVELS.length - 1 ? `<button class="btn btn-small btn-ghost" onclick="goToHole(${currentHole + 1})">SKIP &rarr;</button>` : ""}
              <button class="btn btn-small btn-ghost" onclick="renderTitleScreen()" style="margin-left: auto;">MENU</button>
            </div>

            <div class="progress-bar">
              <div class="progress-track">
                <div class="progress-fill" style="width: ${(Object.keys(progress.best).length / LEVELS.length) * 100}%"></div>
              </div>
              <div class="progress-label">
                <span>${Object.keys(progress.best).length} / ${LEVELS.length} completed</span>
                <span>${getTotalStars()} &#9733;</span>
              </div>
            </div>
          </div>
        `;

            const input = document.getElementById("regexInput");
            input.addEventListener("input", (e) => {
                currentInput = e.target.value;
                renderHole();
                document.getElementById("regexInput").focus();
                restoreCaret(e.target.selectionStart);
            });

            input.focus();
        }

        function restoreCaret(pos) {
            const el = document.getElementById("regexInput");
            if (el) {
                el.setSelectionRange(pos, pos);
            }
        }

        function submitHole() {
            const level = LEVELS[currentHole];
            const { allCorrect } = evaluateLevel(currentInput, level);
            if (!allCorrect) return;

            const length = currentInput.length;
            if (progress.best[currentHole] == null || length < progress.best[currentHole]) {
                progress.best[currentHole] = length;
                saveProgress(progress);
            }

            renderHoleComplete(length, level.par);
        }

        function renderHoleComplete(length, par) {
            const level = LEVELS[currentHole];
            const stars = getStars(length, par);
            const label = getScoreLabel(length, par);
            const diff = length - par;
            const diffStr = diff === 0 ? "Even par" : diff < 0 ? `${diff} (${Math.abs(diff)} under par)` : `+${diff} (${diff} over par)`;
            const isLast = currentHole === LEVELS.length - 1;
            const allDone = Object.keys(progress.best).length === LEVELS.length;

            if (stars === 3) spawnConfetti();

            app.innerHTML = `
          <div class="hole-complete">
            <div class="result-stars">${renderStars(stars)}</div>
            <div class="result-label ${label.cls}">${label.text}!</div>
            <p class="result-detail">${escHtml(level.name)} &mdash; ${diffStr}</p>
            <div class="result-regex">/${escHtml(currentInput)}/</div>
            <p class="result-detail">${length} stroke${length !== 1 ? "s" : ""} (par ${par})</p>
            <div class="actions">
              ${!isLast ? `<button class="btn" onclick="goToHole(${currentHole + 1})">NEXT HOLE &rarr;</button>` : ""}
              ${isLast || allDone ? `<button class="btn ${!isLast ? "btn-ghost" : ""}" onclick="renderScorecard()">SCORECARD</button>` : ""}
              <button class="btn btn-small btn-ghost" onclick="renderHole()">RETRY</button>
            </div>
          </div>
        `;
        }

        function renderScorecard() {
            const totalPar = LEVELS.reduce((s, l) => s + l.par, 0);
            const totalStrokes = LEVELS.reduce((s, l, i) => s + (progress.best[i] || 0), 0);
            const solved = Object.keys(progress.best).length;
            const totalStars = getTotalStars();

            const rows = LEVELS.map((level, i) => {
                const best = progress.best[i];
                const solved = best != null;
                const diff = solved ? best - level.par : null;
                const diffStr = diff === null ? "-" : diff === 0 ? "E" : diff < 0 ? diff : `+${diff}`;
                const cls = diff === null ? "" : diff < 0 ? "sc-under" : diff === 0 ? "sc-par" : "sc-over";
                const stars = solved ? getStars(best, level.par) : 0;

                return `<tr>
            <td class="hole-num">${i + 1}</td>
            <td style="text-align: left;">${escHtml(level.name)}</td>
            <td>${level.par}</td>
            <td>${solved ? best : "-"}</td>
            <td class="${cls}">${diffStr}</td>
            <td>${renderStars(stars)}</td>
          </tr>`;
            }).join("");

            const totalDiff = totalStrokes - totalPar;
            const totalDiffStr = solved === 0 ? "-" : totalDiff === 0 ? "E" : totalDiff < 0 ? totalDiff : `+${totalDiff}`;
            const totalCls = solved === 0 ? "" : totalDiff < 0 ? "sc-under" : totalDiff === 0 ? "sc-par" : "sc-over";

            if (solved === LEVELS.length) spawnConfetti();

            app.innerHTML = `
          <div class="scorecard">
            <h2>${solved === LEVELS.length ? "COURSE COMPLETE!" : "SCORECARD"}</h2>
            <div class="total-stars">${totalStars} / ${LEVELS.length * 3} &#9733;</div>

            <table class="scorecard-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th style="text-align: left;">Hole</th>
                  <th>Par</th>
                  <th>Strokes</th>
                  <th>+/-</th>
                  <th>Stars</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
                <tr style="font-weight: 700; border-top: 2px solid var(--border);">
                  <td></td>
                  <td style="text-align: left;">TOTAL</td>
                  <td>${totalPar}</td>
                  <td>${solved > 0 ? totalStrokes : "-"}</td>
                  <td class="${totalCls}">${totalDiffStr}</td>
                  <td>${renderStars(Math.floor(totalStars / LEVELS.length))}</td>
                </tr>
              </tbody>
            </table>

            <div class="actions">
              ${solved < LEVELS.length ? `<button class="btn" onclick="goToNextUnsolved()">CONTINUE</button>` : ""}
              <button class="btn ${solved === LEVELS.length ? "" : "btn-ghost"}" onclick="renderTitleScreen()">MENU</button>
              <button class="btn btn-small btn-ghost" onclick="resetProgress()">RESET ALL</button>
            </div>
          </div>
        `;
        }

        /* ========================================
           Navigation
           ======================================== */
        function startGame(hole) {
            currentHole = hole;
            currentInput = "";
            renderHole();
        }

        function goToHole(hole) {
            currentHole = hole;
            currentInput = "";
            renderHole();
        }

        function goToNextUnsolved() {
            for (let i = 0; i < LEVELS.length; i++) {
                if (progress.best[i] == null) {
                    goToHole(i);
                    return;
                }
            }
            goToHole(0);
        }

        function resetProgress() {
            progress = { best: {} };
            saveProgress(progress);
            renderTitleScreen();
        }

        function getTotalStars() {
            return LEVELS.reduce((s, l, i) => s + (progress.best[i] != null ? getStars(progress.best[i], l.par) : 0), 0);
        }

        /* ========================================
           Utilities
           ======================================== */
        function escHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function escAttr(str) {
            return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        /* ========================================
           Confetti
           ======================================== */
        function spawnConfetti() {
            const container = document.createElement("div");
            container.className = "confetti-container";
            document.body.appendChild(container);

            const colors = ["#00ff88", "#00ccff", "#ffd700", "#ff3366", "#a855f7", "#f97316"];

            for (let i = 0; i < 60; i++) {
                const piece = document.createElement("div");
                piece.className = "confetti-piece";
                piece.style.left = Math.random() * 100 + "%";
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = 1.5 + Math.random() * 2 + "s";
                piece.style.animationDelay = Math.random() * 0.5 + "s";
                piece.style.width = 4 + Math.random() * 8 + "px";
                piece.style.height = 4 + Math.random() * 8 + "px";
                piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "1px";
                container.appendChild(piece);
            }

            setTimeout(() => container.remove(), 4000);
        }

        /* ========================================
           Keyboard Shortcuts
           ======================================== */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                const submitBtn = app.querySelector(".btn:not(:disabled):not(.btn-ghost)");
                if (submitBtn && document.activeElement?.classList.contains("regex-input")) {
                    e.preventDefault();
                    submitBtn.click();
                }
            }
        });

        /* ========================================
           Init
           ======================================== */
        renderTitleScreen();
    </script>
</body>

</html>
