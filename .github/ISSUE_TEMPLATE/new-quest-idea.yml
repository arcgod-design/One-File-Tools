name: New Quest Idea
description: Propose a new interactive learning quest.
title: "Idea: "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new quest! Please fill in the details below.
        Quests are interactive, gamified lessons — think Flexbox Froggy, but for any dev concept. Make sure your idea isn't already an existing quest or open issue.

  - type: input
    id: quest-name
    attributes:
      label: Quest Name
      description: A short, descriptive name for the quest.
      placeholder: e.g. Git Bisect Detective, Flexbox Froggy
    validations:
      required: true

  - type: input
    id: filename
    attributes:
      label: Proposed Filename
      description: Kebab-case .html filename.
      placeholder: e.g. git-bisect-detective.html
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this quest belong to?
      options:
        - Git & Version Control
        - CSS Fundamentals
        - JavaScript Fundamentals
        - Other (propose a new category in the description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What concept does this quest teach? What's the gameplay hook?
      placeholder: Describe the quest's learning goal and how the interactive gameplay teaches it.
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Key Features
      description: List the main features (use bullet points).
      placeholder: |
        - Feature 1
        - Feature 2
        - Feature 3
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested Difficulty
      description: How complex do you think this quest is? (Final label assigned by maintainer, slightly negotiable.)
      options:
        - Easy
        - Medium
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags for filtering on the landing page.
      placeholder: e.g. git, bisect, interactive, binary-search

  - type: textarea
    id: references
    attributes:
      label: References / Inspiration
      description: Any existing games, tools, or links for reference? (optional)
      placeholder: Links to similar interactive lessons or screenshots for inspiration.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked existing quests and open issues for duplicates.
          required: true
        - label: This quest can be built as a single self-contained HTML file.
          required: true
        - label: This quest does not require a backend server to function.
          required: true